name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run Go checks
        run: |
          go vet ./...
          go test ./...

      - name: Build CLI application
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            go build -tags cli -o qmlauncher-cli .
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            go build -tags cli -o qmlauncher-cli.exe .
          else
            go build -tags cli -o qmlauncher-cli .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: qmlauncher-cli-${{ matrix.os }}
          path: |
            qmlauncher-cli
            qmlauncher-cli.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Display structure of downloaded files
        run: |
          echo "Downloaded artifacts structure:"
          find dist/ -type f -name "qmlauncher-cli*" -exec ls -la {} \;

      - name: Prepare release assets
        run: |
          # Flatten all binaries to root dist directory
          find dist/ -name "qmlauncher-cli*" -type f -exec cp {} dist/ \;
          echo "Prepared assets:"
          ls -la dist/qmlauncher-cli*

      - name: Checkout CHANGELOG from main
        uses: actions/checkout@v5
        with:
          ref: main  # Get CHANGELOG from main branch
          path: changelog-temp
          sparse-checkout: |
            CHANGELOG.md

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NUM=${VERSION#v}  # Remove 'v' prefix

          # Extract changelog for this version
          if [[ -f changelog-temp/CHANGELOG.md ]]; then
            CHANGELOG_CONTENT=$(sed -n '/^## \['$VERSION_NUM'\]/,/^## \[/p' changelog-temp/CHANGELOG.md | sed -n '1,/^## \[/p' | head -n -1 | tail -n +3)
            if [[ -z "$CHANGELOG_CONTENT" ]]; then
              CHANGELOG_CONTENT="No changelog content found for version $VERSION_NUM"
            fi
          else
            CHANGELOG_CONTENT="CHANGELOG.md not found"
          fi

          echo "changelog=$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT

      - name: Setup GitHub CLI authentication
        run: |
          echo "Setting up GitHub CLI authentication..."
          echo ${{ secrets.GITHUB_TOKEN }} | gh auth login --with-token
          gh auth status
          echo "Current repository: ${{ github.repository }}"

      - name: Create Release
        id: create_release
        working-directory: .
        run: |
          TAG_NAME="${{ github.ref_name }}"
          CHANGELOG="${{ steps.changelog.outputs.changelog }}"

          # Create release notes
          cat > release_notes.md << EOF
          Release $TAG_NAME

          ## Changes
          $CHANGELOG

          ## Downloads
          - Linux: qmlauncher-cli
          - macOS: qmlauncher-cli
          - Windows: qmlauncher-cli.exe
          EOF

          echo "Creating release for tag: $TAG_NAME"

          # Create release and capture output
          if gh release create "$TAG_NAME" \
            --repo ${{ github.repository }} \
            --title "Release $TAG_NAME" \
            --notes-file release_notes.md \
            --draft=false \
            --prerelease=false; then
            echo "release_created=true" >> $GITHUB_OUTPUT
            echo "✅ Release created successfully"
          else
            echo "release_created=false" >> $GITHUB_OUTPUT
            echo "❌ Failed to create release"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        if: steps.create_release.outputs.release_created == 'true'
        working-directory: .
        run: |
          TAG_NAME="${{ github.ref_name }}"
          echo "Uploading assets for release: $TAG_NAME"

          # Create assets directory and copy all binaries
          mkdir -p assets
          find dist/ -name "qmlauncher-cli*" -type f -exec cp {} assets/ \;

          echo "Prepared assets:"
          ls -la assets/

          # Upload all assets from assets directory
          if gh release upload "$TAG_NAME" \
            --repo ${{ github.repository }} \
            assets/* --clobber; then
            echo "✅ Assets uploaded successfully"
          else
            echo "❌ Failed to upload assets"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}