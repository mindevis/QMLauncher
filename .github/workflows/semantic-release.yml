# Bump version, changelog, Go `version.go` / `internal/version`, tag vX.Y.Z — same pattern as QMAdmin.
# Push of the tag triggers `release-qmlauncher.yml` (sole GitHub Release + Linux/Windows binaries).
# `@semantic-release/github` is intentionally omitted so releases are not created without artifacts.
# A release runs only when commits warrant a semver bump (feat/fix/perf, chore(deps)*, …).
# Plain chore:/docs:/ci: without deps scope still skips a release — use fix/feat or chore(deps).

name: Semantic release · QMLauncher

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin +refs/heads/main:refs/remotes/origin/main
          git checkout main
          git reset --hard origin/main
          ./frontend/node_modules/.bin/semantic-release
