# Bump version, changelog, Go `version.go` / `internal/version`, tag vX.Y.Z — same pattern as QMAdmin.
# Tags pushed by this job use GITHUB_TOKEN, so `on: push: tags` does NOT run `release-qmlauncher.yml`.
# After a successful release we `workflow_dispatch` that workflow so binaries + GitHub Release are created.
# `@semantic-release/github` is intentionally omitted so releases are not created without artifacts.
# A release runs only when commits warrant a semver bump (feat/fix/perf/refactor, chore(deps)*, …).
# Plain chore:/docs:/ci: without deps scope still skips a release — use fix/feat/refactor or chore(deps).

name: Semantic release · QMLauncher

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin +refs/heads/main:refs/remotes/origin/main
          git checkout main
          git reset --hard origin/main
          ./frontend/node_modules/.bin/semantic-release

      - name: Trigger Release QMLauncher when a new tag was published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          git fetch origin --tags
          TAG=""
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            TAG=$(git describe --tags --exact-match HEAD)
          fi
          if [[ -n "${TAG}" && "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Dispatching Release QMLauncher for ${TAG}"
            gh workflow run "Release QMLauncher" --repo "${{ github.repository }}" -f "tag=${TAG}" --ref main
          else
            echo "No semver tag at HEAD; skipping binary release dispatch."
          fi
