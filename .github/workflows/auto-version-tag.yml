name: Auto Version and Tag

on:
  workflow_run:
    workflows: ["Build QMLauncher"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-version:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      !startsWith(github.event.workflow_run.head_branch, 'refs/tags/') &&
      (github.event.workflow_run.head_branch == 'refs/heads/master' || github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get current version
        id: get_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate next version
        id: next_version
        run: |
          CURRENT_VERSION="${{ steps.get_version.outputs.current_version }}"
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          
          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEXT_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_VERSION"

      - name: Update version in package.json
        run: |
          NEXT_VERSION="${{ steps.next_version.outputs.next_version }}"
          npm version $NEXT_VERSION --no-git-tag-version
          echo "Updated package.json version to $NEXT_VERSION"

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit version update
        id: commit
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.next_version.outputs.next_version }}" || exit 0
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          NEXT_VERSION="${{ steps.next_version.outputs.next_version }}"
          TAG_NAME="v$NEXT_VERSION"
          if git ls-remote --tags origin "$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping tag creation"
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will create it"
          fi

      - name: Commit and push version update
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          git push origin HEAD:master
          echo "Pushed version update to master"

      - name: Create and push tag
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          NEXT_VERSION="${{ steps.next_version.outputs.next_version }}"
          TAG_NAME="v$NEXT_VERSION"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME: Auto-generated after successful build"
          git push origin "$TAG_NAME"
          echo "Created and pushed tag: $TAG_NAME"
      
      - name: Trigger release build
        if: steps.check_tag.outputs.tag_exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = 'v${{ steps.next_version.outputs.next_version }}';
            console.log(`Verifying tag ${tagName} and checking if workflow will trigger...`);
            
            // Verify tag exists
            const { data: refs } = await github.rest.git.listMatchingRefs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tagName}`
            });
            
            if (refs.length > 0) {
              console.log(`✓ Tag ${tagName} exists`);
              console.log(`The 'Build QMLauncher' workflow should trigger automatically for tag ${tagName}`);
              console.log(`Check Actions tab to see if the workflow started`);
            } else {
              console.log(`✗ Warning: Tag ${tagName} not found after push`);
            }
            
            // Wait a bit for GitHub to process the tag push
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Try to manually trigger the workflow using workflow_dispatch
            try {
              console.log(`Attempting to trigger workflow for tag ${tagName}...`);
              
              // Get workflow ID
              const { data: workflows } = await github.rest.actions.listWorkflows({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              
              const buildWorkflow = workflows.workflows.find(w => w.name === 'Build QMLauncher' || w.path === '.github/workflows/build-all.yml');
              
              if (buildWorkflow) {
                console.log(`Found workflow: ${buildWorkflow.name} (ID: ${buildWorkflow.id})`);
                console.log(`Note: Workflow should trigger automatically on tag push.`);
                console.log(`If it doesn't trigger, you may need to manually run it from Actions tab.`);
              } else {
                console.log(`⚠ Could not find 'Build QMLauncher' workflow`);
              }
              
              // Check if workflow run was created
              await new Promise(resolve => setTimeout(resolve, 3000));
              
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build-all.yml',
                per_page: 5
              });
              
              const tagRun = runs.workflow_runs.find(run => run.head_branch === tagName || run.head_branch === tagName.replace('v', ''));
              
              if (tagRun) {
                console.log(`✓ Workflow run found: ${tagRun.html_url}`);
                console.log(`  Status: ${tagRun.status}, Conclusion: ${tagRun.conclusion || 'pending'}`);
              } else {
                console.log(`⚠ No workflow run found for tag ${tagName} yet.`);
                console.log(`  This may be because GitHub needs time to process the tag push.`);
                console.log(`  Please check the Actions tab manually.`);
              }
            } catch (error) {
              console.log(`Note: Could not check/trigger workflow (this is normal): ${error.message}`);
            }

      - name: Summary
        run: |
          echo "## Version Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Previous version: ${{ steps.get_version.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- New version: ${{ steps.next_version.outputs.next_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag created: v${{ steps.next_version.outputs.next_version }}" >> $GITHUB_STEP_SUMMARY

