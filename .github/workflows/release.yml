name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install garble (for obfuscation)
        run: go install mvdan.cc/garble@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Windows launcher
        run: wails build -platform windows/amd64 -obfuscated

      - name: Find Windows executable
        id: find-exe
        run: |
          cd build/bin
          FILE=$(find . -name "*.exe" -type f | head -1)
          if [ -z "$FILE" ]; then
            echo "No Windows executable found!"
            ls -la
            exit 1
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Found file: $FILE"

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG, Version: $VERSION"

      - name: Extract release notes from CHANGELOG
        id: release-notes
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          echo "Looking for version: $VERSION"
          
          # Extract section from CHANGELOG.md
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "Found version section in CHANGELOG.md"
            # Extract from version header to next version header or end of file
            awk -v version="$VERSION" '
              /^## \[/ && found && !/^## \[/ {exit}
              /^## \[/ && $0 ~ "## \\[" version "\\]" {found=1; next}
              found {print}
            ' CHANGELOG.md > release_notes.md
            
            # If file is empty, use fallback
            if [ ! -s release_notes.md ]; then
              echo "Extracted notes are empty, using fallback"
              echo "# Release ${{ steps.version.outputs.tag }}" > release_notes.md
              echo "" >> release_notes.md
              echo "Release ${{ steps.version.outputs.tag }}" >> release_notes.md
            fi
          else
            echo "Version section not found, using fallback"
            # Fallback: use tag message
            echo "# Release ${{ steps.version.outputs.tag }}" > release_notes.md
            echo "" >> release_notes.md
            echo "Release ${{ steps.version.outputs.tag }}" >> release_notes.md
          fi
          
          echo "Release notes:"
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-rc') || contains(steps.version.outputs.version, '-alpha') || contains(steps.version.outputs.version, '-beta') }}
          files: |
            build/bin/${{ steps.find-exe.outputs.file }}
