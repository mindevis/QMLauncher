name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Verify Go version
        run: |
          go version
          GO_VERSION=$(go version | awk '{print $3}' | sed 's/go//')
          echo "Go version: $GO_VERSION"
          if [[ $(echo "$GO_VERSION 1.25.0" | tr " " "\n" | sort -V | head -1) != "1.25.0" ]]; then
            echo "ERROR: Go version is too old, need 1.25.0 or newer"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install garble (for obfuscation)
        run: go install mvdan.cc/garble@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Windows launcher
        run: wails build -platform windows/amd64 -obfuscated

      - name: Find Windows executable
        id: find-exe
        run: |
          cd build/bin
          FILE=$(find . -name "*.exe" -type f | head -1)
          if [ -z "$FILE" ]; then
            echo "No Windows executable found!"
            ls -la
            exit 1
          fi
          # Remove ./ prefix if present
          FILE=$(echo "$FILE" | sed 's|^\./||')
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Found file: $FILE"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-windows-amd64.exe
          path: build/bin/${{ steps.find-exe.outputs.file }}
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            gcc \
            g++ \
            libc6-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Verify Go version
        run: |
          go version
          GO_VERSION=$(go version | awk '{print $3}' | sed 's/go//')
          echo "Go version: $GO_VERSION"
          if [[ $(echo "$GO_VERSION 1.25.0" | tr " " "\n" | sort -V | head -1) != "1.25.0" ]]; then
            echo "ERROR: Go version is too old, need 1.25.0 or newer"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install garble (for obfuscation)
        run: go install mvdan.cc/garble@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Linux launcher
        run: wails build -platform linux/amd64 -obfuscated -tags webkit2_41

      - name: Find Linux executable
        id: find-linux
        run: |
          cd build/bin
          # Look for executable or AppImage
          FILE=$(find . -type f \( -name "QMLauncher" -o -name "*.AppImage" \) | head -1)
          if [ -z "$FILE" ]; then
            echo "No Linux executable found!"
            ls -la
            exit 1
          fi
          # Remove ./ prefix if present
          FILE=$(echo "$FILE" | sed 's|^\./||')
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Found file: $FILE"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-linux-amd64
          path: build/bin/${{ steps.find-linux.outputs.file }}
          retention-days: 1

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Verify Go version
        run: |
          go version
          GO_VERSION=$(go version | awk '{print $3}' | sed 's/go//')
          echo "Go version: $GO_VERSION"
          if [[ $(echo "$GO_VERSION 1.25.0" | tr " " "\n" | sort -V | head -1) != "1.25.0" ]]; then
            echo "ERROR: Go version is too old, need 1.25.0 or newer"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install garble (for obfuscation)
        run: go install mvdan.cc/garble@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build macOS launcher
        run: wails build -platform darwin/amd64 -obfuscated

      - name: Find macOS executable
        id: find-macos
        run: |
          cd build/bin
          # Look for .app, .dmg, or .pkg
          FILE=$(find . -type f \( -name "*.dmg" -o -name "*.pkg" \) | head -1)
          if [ -z "$FILE" ]; then
            # Try to find .app directory
            APP_DIR=$(find . -type d -name "*.app" | head -1)
            if [ -n "$APP_DIR" ]; then
              # Remove ./ prefix if present
              APP_DIR=$(echo "$APP_DIR" | sed 's|^\./||')
              # Create zip from .app
              zip -r QMLauncher-macos-amd64.zip "$APP_DIR"
              echo "file=QMLauncher-macos-amd64.zip" >> $GITHUB_OUTPUT
            else
              echo "No macOS build file found!"
              ls -la
              exit 1
            fi
          else
            # Remove ./ prefix if present
            FILE=$(echo "$FILE" | sed 's|^\./||')
            if [[ "$FILE" == *.dmg ]]; then
              cp "$FILE" QMLauncher-macos-amd64.dmg
              echo "file=QMLauncher-macos-amd64.dmg" >> $GITHUB_OUTPUT
            elif [[ "$FILE" == *.pkg ]]; then
              cp "$FILE" QMLauncher-macos-amd64.pkg
              echo "file=QMLauncher-macos-amd64.pkg" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Found file: $FILE"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-macos-amd64
          path: build/bin/${{ steps.find-macos.outputs.file }}
          retention-days: 1

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG, Version: $VERSION"

      - name: Extract release notes from CHANGELOG
        id: release-notes
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          echo "Looking for version: $VERSION"
          
          # Extract section from CHANGELOG.md
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "Found version section in CHANGELOG.md"
            # Extract from version header to next version header or end of file
            awk -v version="$VERSION" '
              /^## \[/ && found && !/^## \[/ {exit}
              /^## \[/ && $0 ~ "## \\[" version "\\]" {found=1; next}
              found {print}
            ' CHANGELOG.md > release_notes.md
            
            # If file is empty, use fallback
            if [ ! -s release_notes.md ]; then
              echo "Extracted notes are empty, using fallback"
              echo "# Release ${{ steps.version.outputs.tag }}" > release_notes.md
              echo "" >> release_notes.md
              echo "Release ${{ steps.version.outputs.tag }}" >> release_notes.md
            fi
          else
            echo "Version section not found, using fallback"
            # Fallback: use tag message
            echo "# Release ${{ steps.version.outputs.tag }}" > release_notes.md
            echo "" >> release_notes.md
            echo "Release ${{ steps.version.outputs.tag }}" >> release_notes.md
          fi
          
          echo "Release notes:"
          cat release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Rename files with version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}
          
          cd artifacts
          
          # Rename Linux file
          if [ -f "QMLauncher-linux-amd64/QMLauncher" ]; then
            mv "QMLauncher-linux-amd64/QMLauncher" "QMLauncher-${TAG}-linux-amd64"
            rmdir "QMLauncher-linux-amd64" || true
          elif [ -f "QMLauncher-linux-amd64" ]; then
            mv "QMLauncher-linux-amd64" "QMLauncher-${TAG}-linux-amd64"
          fi
          
          # Rename Windows file
          if [ -f "QMLauncher-windows-amd64/QMLauncher.exe" ]; then
            mv "QMLauncher-windows-amd64/QMLauncher.exe" "QMLauncher-${TAG}-windows-amd64.exe"
            rmdir "QMLauncher-windows-amd64" || true
          elif [ -f "QMLauncher-windows-amd64.exe" ]; then
            mv "QMLauncher-windows-amd64.exe" "QMLauncher-${TAG}-windows-amd64.exe"
          fi
          
          # Rename macOS file
          if [ -f "QMLauncher-macos-amd64/QMLauncher-macos-amd64.zip" ]; then
            mv "QMLauncher-macos-amd64/QMLauncher-macos-amd64.zip" "QMLauncher-${TAG}-macos-amd64.zip"
            rmdir "QMLauncher-macos-amd64" || true
          elif [ -f "QMLauncher-macos-amd64/QMLauncher-macos-amd64.dmg" ]; then
            mv "QMLauncher-macos-amd64/QMLauncher-macos-amd64.dmg" "QMLauncher-${TAG}-macos-amd64.dmg"
            rmdir "QMLauncher-macos-amd64" || true
          elif [ -f "QMLauncher-macos-amd64/QMLauncher-macos-amd64.pkg" ]; then
            mv "QMLauncher-macos-amd64/QMLauncher-macos-amd64.pkg" "QMLauncher-${TAG}-macos-amd64.pkg"
            rmdir "QMLauncher-macos-amd64" || true
          elif [ -f "QMLauncher-macos-amd64.zip" ]; then
            mv "QMLauncher-macos-amd64.zip" "QMLauncher-${TAG}-macos-amd64.zip"
          elif [ -f "QMLauncher-macos-amd64.dmg" ]; then
            mv "QMLauncher-macos-amd64.dmg" "QMLauncher-${TAG}-macos-amd64.dmg"
          elif [ -f "QMLauncher-macos-amd64.pkg" ]; then
            mv "QMLauncher-macos-amd64.pkg" "QMLauncher-${TAG}-macos-amd64.pkg"
          fi
          
          echo "Renamed files:"
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-rc') || contains(steps.version.outputs.version, '-alpha') || contains(steps.version.outputs.version, '-beta') }}
          files: |
            artifacts/**/*
