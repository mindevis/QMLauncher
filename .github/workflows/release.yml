name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install garble (for obfuscation)
        run: go install mvdan.cc/garble@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Windows launcher
        run: wails build -platform windows/amd64 -obfuscated

      - name: Find and prepare Windows artifact
        id: find-windows
        run: |
          cd build/bin
          FILE=$(find . -name "*.exe" -type f | head -1)
          if [ -z "$FILE" ]; then
            echo "No Windows executable found!"
            exit 1
          fi
          cp "$FILE" QMLauncher-windows-amd64.exe
          echo "file=QMLauncher-windows-amd64.exe" >> $GITHUB_OUTPUT
          echo "Found file: $FILE"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-windows-amd64.exe
          path: build/bin/QMLauncher-windows-amd64.exe
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install garble (for obfuscation)
        run: go install mvdan.cc/garble@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Linux launcher
        run: wails build -platform linux/amd64 -obfuscated

      - name: Find and prepare Linux artifact
        id: find-linux
        run: |
          cd build/bin
          # Look for executable or AppImage
          FILE=$(find . -type f \( -name "QMLauncher" -o -name "*.AppImage" \) | head -1)
          if [ -z "$FILE" ]; then
            echo "No Linux executable found!"
            exit 1
          fi
          # If it's an AppImage, use it as-is, otherwise copy as QMLauncher
          if [[ "$FILE" == *.AppImage ]]; then
            cp "$FILE" QMLauncher-linux-amd64.AppImage
            echo "file=QMLauncher-linux-amd64.AppImage" >> $GITHUB_OUTPUT
          else
            cp "$FILE" QMLauncher-linux-amd64
            chmod +x QMLauncher-linux-amd64
            echo "file=QMLauncher-linux-amd64" >> $GITHUB_OUTPUT
          fi
          echo "Found file: $FILE"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-linux-amd64
          path: build/bin/${{ steps.find-linux.outputs.file }}
          retention-days: 1

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install garble (for obfuscation)
        run: go install mvdan.cc/garble@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build macOS launcher
        run: wails build -platform darwin/amd64 -obfuscated

      - name: Find and prepare macOS artifact
        id: find-macos
        run: |
          cd build/bin
          # Look for .app, .dmg, or .pkg
          FILE=$(find . -type f \( -name "*.dmg" -o -name "*.pkg" \) -o -type d -name "*.app" | head -1)
          if [ -z "$FILE" ]; then
            # Try to find .app directory
            APP_DIR=$(find . -type d -name "*.app" | head -1)
            if [ -n "$APP_DIR" ]; then
              # Create DMG or zip the app
              zip -r QMLauncher-macos-amd64.zip "$APP_DIR"
              echo "file=QMLauncher-macos-amd64.zip" >> $GITHUB_OUTPUT
            else
              echo "No macOS build file found!"
              exit 1
            fi
          else
            if [[ "$FILE" == *.dmg ]]; then
              cp "$FILE" QMLauncher-macos-amd64.dmg
              echo "file=QMLauncher-macos-amd64.dmg" >> $GITHUB_OUTPUT
            elif [[ "$FILE" == *.pkg ]]; then
              cp "$FILE" QMLauncher-macos-amd64.pkg
              echo "file=QMLauncher-macos-amd64.pkg" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Found file: $FILE"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-macos-amd64
          path: build/bin/${{ steps.find-macos.outputs.file }}
          retention-days: 1

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG, Version: $VERSION"

      - name: Extract release notes from CHANGELOG
        id: release-notes
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Extract section from CHANGELOG.md
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            # Extract everything from the version header to the next version header
            awk "/^## \[$VERSION\]/,/^## \[/{if (!/^## \[/ || /^## \[$VERSION\]/) print}" CHANGELOG.md | sed '/^## \[/d' > release_notes.md
          else
            # Fallback: use tag message
            echo "# Release ${{ steps.version.outputs.tag }}" > release_notes.md
            echo "" >> release_notes.md
            echo "Release ${{ steps.version.outputs.tag }}" >> release_notes.md
          fi
          
          # Add header
          sed -i '1s/^/# Release Notes\n\n/' release_notes.md
          
          cat release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-rc') || contains(steps.version.outputs.version, '-alpha') || contains(steps.version.outputs.version, '-beta') }}
          files: |
            artifacts/**/*
