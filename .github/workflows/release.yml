name: release

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build cross-platform binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build binaries for all platforms
        run: |
          # Linux
          GOOS=linux GOARCH=amd64 go build -o dist/qmlauncher-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o dist/qmlauncher-linux-arm64 .

          # Windows
          GOOS=windows GOARCH=amd64 go build -o dist/qmlauncher-windows-amd64.exe .
          GOOS=windows GOARCH=arm64 go build -o dist/qmlauncher-windows-arm64.exe .

          # macOS (Intel)
          GOOS=darwin GOARCH=amd64 go build -o dist/qmlauncher-darwin-amd64 .

          # macOS (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -o dist/qmlauncher-darwin-arm64 .

      - name: List built binaries
        run: ls -la dist/

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag }}"
          echo "Uploading binaries for tag: $TAG_NAME"
          gh release upload --clobber "$TAG_NAME" dist/*