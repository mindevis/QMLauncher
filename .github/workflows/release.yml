name: release

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build cross-platform CLI binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build CLI binaries for all platforms
        run: |
          # Linux CLI
          GOOS=linux GOARCH=amd64 go build -tags cli -o dist/qmlauncher-cli-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -tags cli -o dist/qmlauncher-cli-linux-arm64 .

          # Windows CLI
          GOOS=windows GOARCH=amd64 go build -tags cli -o dist/qmlauncher-cli-windows-amd64.exe .
          GOOS=windows GOARCH=arm64 go build -tags cli -o dist/qmlauncher-cli-windows-arm64.exe .

          # macOS CLI (Intel)
          GOOS=darwin GOARCH=amd64 go build -tags cli -o dist/qmlauncher-cli-darwin-amd64 .

          # macOS CLI (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -tags cli -o dist/qmlauncher-cli-darwin-arm64 .

      - name: List built binaries
        run: |
          echo "=== CLI Versions ==="
          ls -la dist/ | grep cli

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag }}"
          echo "Uploading CLI binaries for tag: $TAG_NAME"
          gh release upload --clobber "$TAG_NAME" dist/*