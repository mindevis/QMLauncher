name: Create Release Tag

on:
  push:
    branches: [ master, main ]
    paths:
      - 'CHANGELOG.md'

permissions:
  contents: write
  workflows: write  # Allow updating workflow files

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Need full history for tag checking
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new version in CHANGELOG
        id: check
        run: |
          # Extract version from CHANGELOG.md
          VERSION_LINE=$(grep -E "^## \[.*\] -" CHANGELOG.md | head -1)
          if [[ $VERSION_LINE =~ \[([0-9]+\.[0-9]+\.[0-9]+)\] ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "Found version in CHANGELOG: $VERSION"

            # Check if this version tag already exists
            if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION"; then
              echo "Tag v$VERSION already exists, skipping release creation"
              echo "should_release=false" >> $GITHUB_OUTPUT
            else
              echo "New version detected: $VERSION"
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "new_version=$VERSION" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No version found in CHANGELOG"
          fi

  create-tag:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          echo "Creating tag v$VERSION"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          echo "✅ Tag v$VERSION created and pushed"