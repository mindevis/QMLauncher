name: build

on:
  push:
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'CHANGELOG*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'CHANGELOG*.md'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run Go checks
        run: |
          go vet ./...
          go test ./...

      - name: Build CLI application
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            go build -tags cli -o qmlauncher-cli .
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            go build -tags cli -o qmlauncher-cli.exe .
          else
            go build -tags cli -o qmlauncher-cli .
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'push' }}
        with:
          name: qmlauncher-cli_${{ runner.os }}_${{ runner.arch }}
          path: |
            qmlauncher-cli
            qmlauncher-cli.exe

      - name: Create Release
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}

            ## Changes
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ## Downloads
            - Linux: qmlauncher-cli
            - macOS: qmlauncher-cli
            - Windows: qmlauncher-cli.exe
          files: |
            qmlauncher-cli
            qmlauncher-cli.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
