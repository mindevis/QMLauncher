name: build

on:
  push:
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'CHANGELOG*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'CHANGELOG*.md'

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run Go checks
        run: |
          go vet ./...
          go test ./...

      - name: Build CLI application
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            go build -tags cli -o qmlauncher-cli .
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            go build -tags cli -o qmlauncher-cli.exe .
          else
            go build -tags cli -o qmlauncher-cli .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: qmlauncher-cli-${{ matrix.os }}
          path: |
            qmlauncher-cli
            qmlauncher-cli.exe

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Display structure of downloaded files
        run: ls -la dist/

      - name: Create Release and Upload Assets
        run: |
          # Flatten all binaries to root dist directory
          find dist/ -name "qmlauncher-cli*" -type f -exec cp {} dist/ \;

          # Create release with gh CLI
          TAG_NAME="${{ github.ref_name }}"
          echo "Creating release for tag: $TAG_NAME"

          # Create release notes
          cat > release_notes.md << EOF
          Release ${{ github.ref_name }}

          ## Changes
          See [CHANGELOG.md](CHANGELOG.md) for details.

          ## Downloads
          - Linux: qmlauncher-cli
          - macOS: qmlauncher-cli
          - Windows: qmlauncher-cli.exe
          EOF

          # Create release
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes-file release_notes.md \
            --draft=false \
            --prerelease=false \
            dist/qmlauncher-cli* 2>/dev/null || echo "Some files may not exist, continuing..."

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
