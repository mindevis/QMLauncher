name: build

on:
  push:
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'CHANGELOG*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'CHANGELOG*.md'

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run Go checks
        run: |
          go vet ./...
          go test ./...

      - name: Build CLI application
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            go build -tags cli -o qmlauncher-cli .
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            go build -tags cli -o qmlauncher-cli.exe .
          else
            go build -tags cli -o qmlauncher-cli .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: qmlauncher-cli-${{ matrix.os }}
          path: |
            qmlauncher-cli
            qmlauncher-cli.exe

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Display structure of downloaded files
        run: |
          echo "Downloaded artifacts structure:"
          find dist/ -type f -name "qmlauncher-cli*" -exec ls -la {} \;

      - name: Prepare release assets
        run: |
          # Flatten all binaries to root dist directory
          find dist/ -name "qmlauncher-cli*" -type f -exec cp {} dist/ \;
          echo "Prepared assets:"
          ls -la dist/qmlauncher-cli*

      - name: Setup GitHub CLI authentication
        run: |
          echo "Setting up GitHub CLI authentication..."
          echo ${{ secrets.GITHUB_TOKEN }} | gh auth login --with-token
          gh auth status
          echo "Current repository: ${{ github.repository }}"
          echo "Tag name: ${{ github.ref_name }}"

      - name: Create Release
        id: create_release
        run: |
          # Create release notes
          cat > release_notes.md << EOF
          Release ${{ github.ref_name }}

          ## Changes
          See [CHANGELOG.md](CHANGELOG.md) for details.

          ## Downloads
          - Linux: qmlauncher-cli
          - macOS: qmlauncher-cli
          - Windows: qmlauncher-cli.exe
          EOF

          TAG_NAME="${{ github.ref_name }}"
          echo "Creating release for tag: $TAG_NAME"

          # Create release and capture output
          if gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes-file release_notes.md \
            --draft=false \
            --prerelease=false; then
            echo "release_created=true" >> $GITHUB_OUTPUT
            echo "✅ Release created successfully"
          else
            echo "release_created=false" >> $GITHUB_OUTPUT
            echo "❌ Failed to create release"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        if: steps.create_release.outputs.release_created == 'true'
        run: |
          TAG_NAME="${{ github.ref_name }}"
          echo "Uploading assets for release: $TAG_NAME"

          # Flatten all binaries to root dist directory
          find dist/ -name "qmlauncher-cli*" -type f -exec cp {} dist/ \;

          echo "Prepared assets:"
          ls -la dist/qmlauncher-cli*

          # Upload assets
          if gh release upload "$TAG_NAME" dist/qmlauncher-cli* --clobber; then
            echo "✅ Assets uploaded successfully"
          else
            echo "❌ Failed to upload assets"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
