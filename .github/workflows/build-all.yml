name: Build QMLauncher

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
    paths:
      - 'QMLauncher/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all, windows, linux, macos)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux
          - macos

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    if: |
      github.event.inputs.platform == '' || 
      github.event.inputs.platform == 'all' || 
      github.event.inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install SignPath CLI
        if: env.SIGNPATH_PROJECT_ID != ''
        run: |
          choco install signpath-cli -y
        continue-on-error: true
      
      - name: Build
        run: npm run build
      
      - name: Build Windows portable
        run: npx electron-builder --win
        continue-on-error: false
      
      - name: List release files
        shell: cmd
        run: |
          echo "Files in release directory:"
          if exist release (
            dir release /b
            echo.
            echo "Looking for portable exe files:"
            dir release\*portable*.exe /b 2>nul || echo "No portable exe files found"
            echo.
            echo "All exe files:"
            dir release\*.exe /b 2>nul || echo "No exe files found"
            echo.
            echo "All files in release:"
            dir release /s /b
          ) else (
            echo "Release directory does not exist!"
          )
      
      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-windows-unsigned
          path: release/*.exe
          if-no-files-found: warn
          retention-days: 1
      
      - name: Submit signing request to SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: release
        continue-on-error: true
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-windows
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
      
      - name: Upload build artifacts (no release)
        if: github.ref == 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-windows-build
          path: release/*.exe
          if-no-files-found: warn
          retention-days: 7

  build-linux:
    name: Build Linux
    if: |
      github.event.inputs.platform == '' || 
      github.event.inputs.platform == 'all' || 
      github.event.inputs.platform == 'linux'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Build Linux AppImage
        run: npx electron-builder --linux --config.linux.target=AppImage
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-linux
          path: release/*.AppImage
          retention-days: 30
      
      - name: Add files to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.AppImage
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
      
      - name: Upload build artifacts (no release)
        if: github.ref == 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-linux-build
          path: release/*.AppImage
          if-no-files-found: warn
          retention-days: 7

  build-macos:
    name: Build macOS
    if: |
      github.event.inputs.platform == '' || 
      github.event.inputs.platform == 'all' || 
      github.event.inputs.platform == 'macos'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Build macOS DMG
        run: npx electron-builder --mac
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-macos
          path: release/*.dmg
          retention-days: 30
      
      - name: Add files to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.dmg
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
      
      - name: Upload build artifacts (no release)
        if: github.ref == 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-macos-build
          path: release/*.dmg
          if-no-files-found: warn
          retention-days: 7

  auto-version-and-tag:
    name: Auto Version and Tag
    needs: [build-windows, build-linux, build-macos]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      !startsWith(github.ref, 'refs/tags/') &&
      (github.event.inputs.platform == '' || github.event.inputs.platform == 'all') &&
      needs.build-windows.result == 'success' &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get current version
        id: get_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate next version
        id: next_version
        run: |
          CURRENT_VERSION="${{ steps.get_version.outputs.current_version }}"
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          
          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEXT_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_VERSION"

      - name: Update version in package.json
        run: |
          NEXT_VERSION="${{ steps.next_version.outputs.next_version }}"
          npm version $NEXT_VERSION --no-git-tag-version
          echo "Updated package.json version to $NEXT_VERSION"

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit version update
        id: commit
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.next_version.outputs.next_version }}" || exit 0
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          NEXT_VERSION="${{ steps.next_version.outputs.next_version }}"
          TAG_NAME="v$NEXT_VERSION"
          if git ls-remote --tags origin "$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists, skipping tag creation"
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist, will create it"
          fi

      - name: Commit and push version update
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          git push origin HEAD:master
          echo "Pushed version update to master"

      - name: Create and push tag
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          NEXT_VERSION="${{ steps.next_version.outputs.next_version }}"
          TAG_NAME="v$NEXT_VERSION"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME: Auto-generated after successful build"
          git push origin "$TAG_NAME"
          echo "Created and pushed tag: $TAG_NAME"
          echo "This will trigger the workflow again to create the release"

      - name: Summary
        run: |
          echo "## Version Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Previous version: ${{ steps.get_version.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- New version: ${{ steps.next_version.outputs.next_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag created: v${{ steps.next_version.outputs.next_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- The workflow will automatically run again for the tag to create the release" >> $GITHUB_STEP_SUMMARY
