name: Build QMLauncher

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all, windows, linux, macos)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux
          - macos

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Run semantic-release prepare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run only prepare step to update version
          npx semantic-release --dry-run --extends .releaserc.json > release-info.txt 2>&1 || true
          cat release-info.txt
          
          # Extract and set version
          if grep -q "The next release version is" release-info.txt; then
            VERSION=$(grep "The next release version is" release-info.txt | sed 's/.*The next release version is //' | sed 's/\.$//')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            npm version $VERSION --no-git-tag-version
            echo "Updated package.json to version $VERSION"
          else
            echo "No new release needed"
            exit 1
          fi

      - name: Upload package.json
        uses: actions/upload-artifact@v4
        with:
          name: package-json
          path: package.json
          retention-days: 1

  build-windows:
    name: Build Windows
    needs: [prepare]
    if: |
      (github.event.inputs.platform == '' || 
       github.event.inputs.platform == null ||
       github.event.inputs.platform == 'all' || 
       github.event.inputs.platform == 'windows')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download package.json
        uses: actions/download-artifact@v4
        with:
          name: package-json
          path: .
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Build Windows portable
        run: npx electron-builder --win
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifact
          path: release/*.exe
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Build Linux
    needs: [prepare]
    if: |
      (github.event.inputs.platform == '' || 
       github.event.inputs.platform == null ||
       github.event.inputs.platform == 'all' || 
       github.event.inputs.platform == 'linux')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download package.json
        uses: actions/download-artifact@v4
        with:
          name: package-json
          path: .
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Build Linux AppImage
        run: npx electron-builder --linux --config.linux.target=AppImage
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-artifact
          path: release/*.AppImage
          if-no-files-found: error
          retention-days: 1

  build-macos:
    name: Build macOS
    needs: [prepare]
    if: |
      (github.event.inputs.platform == '' || 
       github.event.inputs.platform == null ||
       github.event.inputs.platform == 'all' || 
       github.event.inputs.platform == 'macos')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download package.json
        uses: actions/download-artifact@v4
        with:
          name: package-json
          path: .
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Build macOS DMG
        run: npx electron-builder --mac
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-artifact
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create Release
    needs: [prepare, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Download package.json
        uses: actions/download-artifact@v4
        with:
          name: package-json
          path: .

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-release-artifact'
          path: ./release-artifacts
          merge-multiple: false

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Prepare artifacts for semantic-release
        run: |
          mkdir -p release
          find ./release-artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release
