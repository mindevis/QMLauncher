name: Build QMLauncher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install SignPath CLI
        if: env.SIGNPATH_PROJECT_ID != ''
        run: |
          choco install signpath-cli -y
        continue-on-error: true
      
      - name: Build
        run: npm run build
      
      - name: Build Windows installer
        run: npx electron-builder --win
      
      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-windows-unsigned
          path: release/*Setup*.exe
          retention-days: 1
      
      - name: Submit signing request to SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: release
        continue-on-error: true
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-windows
          path: release/*Setup*.exe
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*Setup*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Build Linux AppImage
        run: npx electron-builder --linux --config.linux.target=AppImage
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-linux
          path: release/*.AppImage
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Build macOS DMG
        run: npx electron-builder --mac
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-macos
          path: release/*.dmg
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true

