name: Build QMLauncher

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all, windows, linux, macos)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux
          - macos

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare Release
    if: |
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
       !startsWith(github.ref, 'refs/tags/') &&
       (github.event.inputs.platform == '' || github.event.inputs.platform == null || github.event.inputs.platform == 'all')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == '' || github.event.inputs.platform == null || github.event.inputs.platform == 'all'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should-release: ${{ steps.release.outputs.should-release }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Analyze commits and determine version
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Checking for tags ==="
          git tag -l | head -5
          echo "=== Last tag ==="
          git describe --tags --abbrev=0 2>/dev/null || echo "No tags found"
          echo "=== Recent commits (should be conventional commits) ==="
          git log --oneline -10
          echo "=== Commits since last tag ==="
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "Last tag: $LAST_TAG"
            git log ${LAST_TAG}..HEAD --oneline --format="%h %s" | head -10
          else
            echo "No tags found, showing last 10 commits:"
            git log --oneline -10
          fi
          
          echo "=== Running semantic-release dry-run ==="
          npx semantic-release --dry-run > release-info.txt 2>&1 || true
          
          echo "=== Semantic-release output ==="
          cat release-info.txt
          echo "=== End semantic-release output ==="
          
          if grep -q "The next release version is" release-info.txt; then
            VERSION=$(grep "The next release version is" release-info.txt | sed 's/.*The next release version is //' | sed 's/\.$//')
            echo "should-release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "✓ Next version: $VERSION"
          elif grep -q "No new release" release-info.txt || grep -q "There are no relevant changes" release-info.txt; then
            echo "should-release=false" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
            echo "⚠ Semantic-release determined: No new release needed"
            echo "Check if commits follow conventional commit format (feat:, fix:, chore:, etc.)"
          else
            # If semantic-release output is unclear, check for conventional commits manually
            if [ -n "$LAST_TAG" ]; then
              CONVENTIONAL_COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --format="%s" | grep -E "^(feat|fix|chore|perf|refactor|docs|style|test|build|ci|revert)(\(.+\))?:" | wc -l)
              if [ "$CONVENTIONAL_COMMITS" -gt 0 ]; then
                echo "Found $CONVENTIONAL_COMMITS conventional commit(s) since $LAST_TAG"
                echo "should-release=true" >> $GITHUB_OUTPUT
                echo "version=" >> $GITHUB_OUTPUT
                echo "⚠ Semantic-release didn't output version, but conventional commits found - will let semantic-release determine version"
              else
                echo "should-release=false" >> $GITHUB_OUTPUT
                echo "version=" >> $GITHUB_OUTPUT
                echo "⚠ No conventional commits found since $LAST_TAG"
              fi
            else
              echo "should-release=false" >> $GITHUB_OUTPUT
              echo "version=" >> $GITHUB_OUTPUT
              echo "⚠ No tags found and semantic-release didn't determine version"
            fi
          fi

      - name: Update version in package.json
        if: steps.release.outputs.should-release == 'true'
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          npm version $VERSION --no-git-tag-version
          echo "Updated package.json version to $VERSION"

      - name: Upload updated package.json
        if: steps.release.outputs.should-release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: package-json
          path: package.json
          retention-days: 1

  build-windows:
    name: Build Windows
    needs: [prepare-release]
    if: |
      (github.event.inputs.platform == '' || 
       github.event.inputs.platform == null ||
       github.event.inputs.platform == 'all' || 
       github.event.inputs.platform == 'windows') &&
      (needs.prepare-release.result == 'success' || 
       github.event_name == 'workflow_dispatch' ||
       startsWith(github.ref, 'refs/tags/'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download updated package.json
        if: needs.prepare-release.outputs.should-release == 'true'
        uses: actions/download-artifact@v4
        with:
          name: package-json
          path: .
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Install SignPath CLI
        if: env.SIGNPATH_PROJECT_ID != ''
        run: |
          choco install signpath-cli -y
        continue-on-error: true
      
      - name: Build
        run: npm run build
      
      - name: Build Windows portable
        run: npx electron-builder --win
      
      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-windows-unsigned
          path: release/*.exe
          if-no-files-found: warn
          retention-days: 1
      
      - name: Submit signing request to SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: release
        continue-on-error: true
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-windows
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30
      
      - name: Upload Windows artifact for release
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifact
          path: release/*.exe
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Build Linux
    needs: [prepare-release]
    if: |
      (github.event.inputs.platform == '' || 
       github.event.inputs.platform == null ||
       github.event.inputs.platform == 'all' || 
       github.event.inputs.platform == 'linux') &&
      (needs.prepare-release.result == 'success' || 
       github.event_name == 'workflow_dispatch' ||
       startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download updated package.json
        if: needs.prepare-release.outputs.should-release == 'true'
        uses: actions/download-artifact@v4
        with:
          name: package-json
          path: .
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Build Linux AppImage
        run: npx electron-builder --linux --config.linux.target=AppImage
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-linux
          path: release/*.AppImage
          retention-days: 30
      
      - name: Upload Linux artifact for release
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-artifact
          path: release/*.AppImage
          if-no-files-found: error
          retention-days: 1

  build-macos:
    name: Build macOS
    needs: [prepare-release]
    if: |
      (github.event.inputs.platform == '' || 
       github.event.inputs.platform == null ||
       github.event.inputs.platform == 'all' || 
       github.event.inputs.platform == 'macos') &&
      (needs.prepare-release.result == 'success' || 
       github.event_name == 'workflow_dispatch' ||
       startsWith(github.ref, 'refs/tags/'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download updated package.json
        if: needs.prepare-release.outputs.should-release == 'true'
        uses: actions/download-artifact@v4
        with:
          name: package-json
          path: .
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Build macOS DMG
        run: npx electron-builder --mac
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-macos
          path: release/*.dmg
          retention-days: 30
      
      - name: Upload macOS artifact for release
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-artifact
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 1

  create-release-semantic:
    name: Create Release with Semantic Release
    needs: [prepare-release, build-windows, build-linux, build-macos]
    if: |
      needs.prepare-release.outputs.should-release == 'true' &&
      needs.build-windows.result == 'success' &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Download updated package.json
        uses: actions/download-artifact@v4
        with:
          name: package-json
          path: .
      
      - name: Get version from prepare-release
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-release-artifact'
          path: ./release-artifacts
          merge-multiple: false

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Prepare artifacts for semantic-release
        run: |
          mkdir -p release
          find ./release-artifacts -type f -exec cp {} release/ \;
          ls -la release/
          echo "=== Artifacts in release directory ==="
          ls -la release/ | head -20

      - name: Set version for semantic-release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Setting version to $VERSION in package.json"
          npm version $VERSION --no-git-tag-version --allow-same-version
          echo "Version set to: $(node -p "require('./package.json').version")"
          
          # Create tag manually to ensure semantic-release uses this version
          echo "Creating tag v$VERSION to lock version"
          git tag -a "v$VERSION" -m "chore(release): $VERSION [skip ci]" || true
          git push origin "v$VERSION" || true

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Current package.json version ==="
          cat package.json | grep '"version"'
          echo "=== Current tags ==="
          git tag -l | tail -5
          echo "=== Running semantic-release ==="
          npx semantic-release
