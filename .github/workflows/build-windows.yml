name: Build QMLauncher for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'QMLauncher/**'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
      
      - name: Build Windows portable
        run: npm run dist:win
        continue-on-error: false
      
      - name: List release files
        run: |
          echo "Files in release directory:"
          if exist release (
            dir release /b
            echo ""
            echo "Looking for portable exe files:"
            dir release\*portable*.exe /b 2>nul || echo "No portable exe files found"
            echo ""
            echo "All exe files:"
            dir release\*.exe /b 2>nul || echo "No exe files found"
            echo ""
            echo "All files in release:"
            dir release /s /b
          ) else (
            echo "Release directory does not exist!"
          )
      
      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-windows-unsigned
          path: release/*.exe
          if-no-files-found: warn
          retention-days: 1
      
      - name: Submit signing request to SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: release
        continue-on-error: true
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-Windows
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30
