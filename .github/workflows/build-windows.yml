name: Build QMLauncher for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'QMLauncher/**'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: QMLauncher/package-lock.json
      
      - name: Install dependencies
        working-directory: ./QMLauncher
        run: npm ci
      
      - name: Build application
        working-directory: ./QMLauncher
        run: npm run build
      
      - name: Build Windows installer
        working-directory: ./QMLauncher
        run: npm run dist:win
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-Windows
          path: QMLauncher/release/*.exe
          retention-days: 30

