name: Build QMLauncher for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'QMLauncher/**'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install SignPath CLI
        if: env.SIGNPATH_PROJECT_ID != ''
        run: |
          choco install signpath-cli -y
        continue-on-error: true
      
      - name: Build application
        run: npm run build
      
      - name: Build Windows installer
        env:
          SIGNPATH_PROJECT_ID: ${{ secrets.SIGNPATH_PROJECT_ID }}
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
        run: npm run dist:win
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QMLauncher-Windows
          path: release/*Setup*.exe
          retention-days: 30

