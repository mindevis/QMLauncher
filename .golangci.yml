# golangci-lint v2 schema (see https://golangci-lint.run/docs/configuration/file/)
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - unused
    - staticcheck
  disable:
    - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - QMLauncher

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
